# Default configuration for Sift
# Here are some predefined groups with common filetypes
# Feel free to adjust to your liking

[groups]
"video" = [
    "mp4",
    "mkv",
    "mov",
    "avi",
    "webm",
    "wmv",
    "flv",
    "m4v",
    "mpg",
    "mpeg",
    "3gp",
    "ts"
]

"audio" = [
    "wav",
    "mp3",
    "aac",
    "flac",
    "opus",
    "ogg",
    "m4a",
    "wma",
    "aiff",
    "mid",
    "midi",
    "alac"
]

"photo" = [
    "jpg",
    "jpeg",
    "png",
    "gif",
    "svg",
    "webp",
    "heic",
    "bmp",
    "tiff",
    "tif",
    "ico",
    "raw"
]

"document" = [
    "pdf",
    "doc",
    "docx",
    "epub",
    "txt",
    "csv",
    "xls",
    "xlsx",
    "ppt",
    "pptx",
    "rtf",
    "epub",
    "md"
]

"executable" = [
    "exe",
    "msi",
    "bat",
    "cmd",
    "ps1",
    "sh",
    "bin",
    "jar",
    "dmg",
    "jar"
]

"adobe" = [
    "psd",
    "ai",
    "prproj",
    "aep",
    "xd",
    "lrcat",
    "sesx",
    "indd",
    "psb"
